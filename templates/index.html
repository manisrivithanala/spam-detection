{% extends "base.html" %}
{% block title %}Home - Spam Detector{% endblock %}

{% block content %}
<div class="row justify-content-center animate__animated animate__fadeIn">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-body">
                <h1 class="card-title text-center">
                    <i class="fas fa-envelope-open-text me-3"></i>
                    Email Spam Detector
                </h1>
                
                <p class="text-center text-secondary mb-4">
                    Enter a message below to check if it's spam or legitimate
                </p>

                <!-- Prediction Form -->
                <form id="predictForm" class="mb-4">
                    <div class="mb-4">
                        <label for="message" class="form-label">
                            <i class="fas fa-pencil-alt me-2"></i>
                            Your Message:
                        </label>
                        <textarea 
                            class="form-control" 
                            id="message" 
                            rows="6" 
                            placeholder="Type or paste your email/message here..."
                            required
                        ></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100" id="predictBtn">
                        <i class="fas fa-search me-2"></i>
                        Analyze Message
                    </button>
                </form>

                <!-- Loading Spinner (hidden by default) -->
                <div id="loading" class="text-center" style="display: none;">
                    <div class="spinner"></div>
                    <p class="mt-3 text-secondary">Analyzing your message...</p>
                </div>

                <!-- Result Display -->
                <div id="resultContainer" style="display: none;">
                    <div class="text-center" id="result"></div>
                    
                    <!-- Confidence Score -->
                    <div class="mt-4" id="confidenceContainer" style="display: none;">
                        <label class="form-label">Confidence Score:</label>
                        <div class="progress">
                            <div class="progress-bar" role="progressbar" id="confidenceBar" style="width: 0%"></div>
                        </div>
                        <p class="text-end mt-2" id="confidenceText"></p>
                    </div>

                    <!-- Retry Button -->
                    <div class="text-center mt-4">
                        <button class="btn btn-outline-secondary" onclick="resetForm()">
                            <i class="fas fa-redo me-2"></i>
                            Check Another Message
                        </button>
                    </div>
                </div>

                <!-- Example Messages -->
                <div class="mt-5">
                    <h5 class="text-secondary mb-3">
                        <i class="fas fa-lightbulb me-2"></i>
                        Try these examples:
                    </h5>
                    <div class="row g-2">
                        <div class="col-md-6">
                            <button class="btn btn-outline-secondary w-100 example-btn" onclick="useExample('spam')">
                                <i class="fas fa-bug me-2 text-danger"></i>
                                Spam Example
                            </button>
                        </div>
                        <div class="col-md-6">
                            <button class="btn btn-outline-secondary w-100 example-btn" onclick="useExample('ham')">
                                <i class="fas fa-check-circle me-2 text-success"></i>
                                Ham Example
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Fixed JavaScript for prediction -->
<script>
// Example messages
const examples = {
    spam: "Congratulations! You've won a free iPhone! Click here to claim your prize now: bit.ly/win-iphone",
    ham: "Hey, are we still meeting for coffee at 3pm tomorrow? Let me know!"
};

// Use example message
function useExample(type) {
    document.getElementById('message').value = examples[type];
    document.getElementById('message').focus();
}

// Reset form
function resetForm() {
    document.getElementById('predictForm').reset();
    document.getElementById('resultContainer').style.display = 'none';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('predictForm').style.display = 'block';
    document.getElementById('message').focus();
}

// Handle form submission
document.getElementById('predictForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const message = document.getElementById('message').value.trim();
    if (!message) {
        showToast('Please enter a message', 'warning');
        return;
    }
    
    // Show loading
    document.getElementById('predictForm').style.display = 'none';
    document.getElementById('loading').style.display = 'block';
    document.getElementById('resultContainer').style.display = 'none';
    
    try {
        // Make prediction request
        const response = await fetch('/predict', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: 'message=' + encodeURIComponent(message)
        });
        
        const data = await response.json();
        
        // Hide loading
        document.getElementById('loading').style.display = 'none';
        document.getElementById('resultContainer').style.display = 'block';
        
        // Show result
        const resultDiv = document.getElementById('result');
        
        if (data.prediction === 'spam') {
            resultDiv.innerHTML = '<span class="badge bg-danger animate__animated animate__pulse">🚨 SPAM DETECTED</span>';
        } else {
            resultDiv.innerHTML = '<span class="badge bg-success animate__animated animate__pulse">✅ LEGITIMATE MESSAGE</span>';
        }
        
        // Show confidence if available
        if (data.confidence) {
            document.getElementById('confidenceContainer').style.display = 'block';
            const confidence = parseFloat(data.confidence);
            document.getElementById('confidenceBar').style.width = confidence + '%';
            document.getElementById('confidenceText').textContent = confidence + '% confident';
        }
        
        // Show success toast
        showToast('Prediction complete!', 'success');
        
    } catch (error) {
        console.error('Error:', error);
        
        // Hide loading, show form
        document.getElementById('loading').style.display = 'none';
        document.getElementById('predictForm').style.display = 'block';
        
        // Show error toast
        showToast('Error making prediction. Please try again.', 'danger');
    }
});

// Toast notification function
function showToast(message, type = 'success') {
    const toastContainer = document.querySelector('.toast-container');
    
    const toast = document.createElement('div');
    toast.className = `toast align-items-center text-white bg-${type} border-0 animate__animated animate__fadeInRight`;
    toast.setAttribute('role', 'alert');
    toast.innerHTML = `
        <div class="d-flex">
            <div class="toast-body">
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'} me-2"></i>
                ${message}
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    `;
    
    toastContainer.appendChild(toast);
    
    const bsToast = new bootstrap.Toast(toast, { delay: 3000 });
    bsToast.show();
    
    toast.addEventListener('hidden.bs.toast', () => toast.remove());
}
</script>
{% endblock %}
